version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: cardzen_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: cardzen
      POSTGRES_USER: cardzen
      POSTGRES_PASSWORD: cardzen_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardzen -d cardzen"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
