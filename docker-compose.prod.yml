version: "3.9"

services:
  cardzen:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest
    container_name: cardzen
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Database ──────────────────────────────────────────────────
      DATABASE_URL: "postgresql://USERNAME:PASSWORD@ep-XXXX.us-east-2.aws.neon.tech/cardzen?sslmode=require"

      # ── NextAuth ──────────────────────────────────────────────────
      NEXTAUTH_SECRET: "REPLACE_WITH_openssl_rand_-base64_32"
      NEXTAUTH_URL: "https://YOUR_DOMAIN_OR_IP"

      # ── App ───────────────────────────────────────────────────────
      NODE_ENV: "production"
      APP_ENV: "production"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
