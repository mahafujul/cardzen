version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardzen_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cardzen_network

  db:
    image: postgres:16-alpine
    container_name: cardzen_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cardzen
      POSTGRES_USER: ${POSTGRES_USER:-cardzen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardzen_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardzen} -d cardzen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cardzen_network

  # Optional: Adminer for DB management
  adminer:
    image: adminer
    container_name: cardzen_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - cardzen_network
    profiles:
      - debug

volumes:
  postgres_data:
    driver: local

networks:
  cardzen_network:
    driver: bridge
